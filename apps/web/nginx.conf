server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (Invicti: HSTS Policy Not Enabled, CVSS 7.7)
    # WARNING: if you ever add an `add_header` inside a `location`
    # block, ALL server-level add_header directives are dropped for
    # that location. This is nginx's documented inheritance
    # behavior. Either repeat them in the location or keep
    # add_header at server scope only.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
