server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (Invicti: HSTS Policy Not Enabled, CVSS 7.7)
    # WARNING: if you ever add an `add_header` inside a `location`
    # block, ALL server-level add_header directives are dropped for
    # that location. This is nginx's documented inheritance
    # behavior. Either repeat them in the location or keep
    # add_header at server scope only.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hashed build assets (index-[hash].js, etc.): filename changes with
    # content, so cache forever. Cache-Control WITHOUT `always` so a 404
    # is never tagged immutable. Security headers repeated per the WARNING
    # above (a location-level add_header drops all server-level ones).
    location /assets/ {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html + SPA fallback: never trust a stale copy. `no-cache` lets
    # the browser store it but forces revalidation (cheap 304 when
    # unchanged), so a plain reload always loads a fresh index pointing at
    # the new hashed bundles. Security headers repeated for the same reason.
    location / {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
