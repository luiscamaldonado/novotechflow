version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: novotechflow-db
    environment:
      POSTGRES_USER: ${DB_USER:-novotechflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-novotechflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
