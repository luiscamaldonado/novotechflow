name: PR Check

on:
  pull_request:
    branches: [master]

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck Web (Vite)
        run: pnpm exec tsc --noEmit --project apps/web/tsconfig.app.json

      - name: Typecheck API (NestJS)
        run: pnpm exec tsc --noEmit --project apps/api/tsconfig.build.json
